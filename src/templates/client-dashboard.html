<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0">
<title>Dashboard ReportACT</title>
<link rel="icon" type="image/png" href="https://actcontrol.com.br/brand/favicon.png">
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0E0E0E;--fg:#161616;--borda:#222;--ambar:#F5B113;--ambar-dim:#C48D0E;--texto:rgba(255,255,255,0.85);--texto-sec:rgba(255,255,255,0.55);--fd:'Manrope',sans-serif;--fb:'Inter',sans-serif}
html{scroll-behavior:smooth}
body{font-family:var(--fb);background:var(--bg);color:#fff;min-height:100vh;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-thumb{background:var(--borda);border-radius:3px}
.container{max-width:1160px;margin:0 auto;padding:20px}

.header{background:var(--fg);border:1px solid var(--borda);border-radius:14px;padding:28px;margin-bottom:20px;position:relative;overflow:hidden}
.header::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--ambar),transparent)}
.header-top{display:flex;justify-content:space-between;align-items:center}
.brand{display:flex;align-items:center;gap:10px}
.brand img{height:32px;width:auto}
.brand span{font-family:var(--fd);font-weight:900;font-size:1.1rem;letter-spacing:-0.3px}
.brand em{font-style:normal;color:var(--ambar)}
.header .time{font-size:11px;color:var(--texto-sec)}
.header h1{font-family:var(--fd);font-size:1.3rem;font-weight:800;margin-top:8px;letter-spacing:-0.3px}
.header .subtitle{color:var(--texto-sec);font-size:13px;margin-top:2px}

.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin-bottom:20px}
.kpi-card{background:var(--fg);border:1px solid var(--borda);border-radius:10px;padding:18px}
.kpi-label{font-size:10px;text-transform:uppercase;letter-spacing:0.5px;color:var(--texto-sec);margin-bottom:4px}
.kpi-value{font-family:var(--fd);font-size:1.5rem;font-weight:800}
.kpi-sub{font-size:11px;color:var(--texto-sec);margin-top:2px}

.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px}
@media(max-width:768px){.grid-2{grid-template-columns:1fr}}

.card{background:var(--fg);border:1px solid var(--borda);border-radius:10px;padding:20px}
.card h3{font-family:var(--fd);font-size:14px;font-weight:700;margin-bottom:14px;color:var(--texto)}
.card canvas{max-height:240px}

.platform-list{margin-top:4px}
.platform-item{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;background:rgba(255,255,255,0.02);border-radius:8px;margin-bottom:6px;border:1px solid var(--borda)}
.platform-item .name{font-size:13px;font-weight:600}
.platform-item .status{font-size:11px}
.status-online{color:#22C55E}
.status-offline{color:var(--texto-sec)}

.loading{text-align:center;padding:100px 20px}
.loading .spinner{width:36px;height:36px;border:2px solid var(--borda);border-top-color:var(--ambar);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 14px}
@keyframes spin{to{transform:rotate(360deg)}}
.loading p{color:var(--texto-sec);font-size:14px}

.footer{text-align:center;padding:20px;color:var(--texto-sec);font-size:12px;border-top:1px solid var(--borda);margin-top:16px}
</style>
</head>
<body>
<div class="container">
  <div id="loading" class="loading">
    <div class="spinner"></div>
    <p>Carregando dashboard...</p>
  </div>

  <div id="content" style="display:none">
    <div class="header">
      <div class="header-top">
        <div class="brand">
          <img src="https://actcontrol.com.br/brand/logo.svg" alt="ACT" onerror="this.style.display='none'">
          <span><em style="font-style:normal;color:var(--ambar)">Report</em>ACT</span>
        </div>
        <div class="time" id="dashTime"></div>
      </div>
      <h1 id="dashTitle">Dashboard</h1>
      <p class="subtitle" id="dashClient">Cliente</p>
    </div>

    <div class="kpi-grid" id="kpiRow">
      <div class="kpi-card"><div class="kpi-label">Gasto Total</div><div class="kpi-value kpi-ambar" id="kpiSpend">R$ 0</div><div class="kpi-sub">Meta Ads + Google Ads</div></div>
      <div class="kpi-card"><div class="kpi-label">Impressões</div><div class="kpi-value" id="kpiImpressions">0</div><div class="kpi-sub">Total de exibições</div></div>
      <div class="kpi-card"><div class="kpi-label">Cliques</div><div class="kpi-value" id="kpiClicks">0</div><div class="kpi-sub">Total de cliques</div></div>
      <div class="kpi-card"><div class="kpi-label">Conversões</div><div class="kpi-value" id="kpiConversions">0</div><div class="kpi-sub">Total de conversões</div></div>
    </div>

    <div class="grid-2">
      <div class="card"><h3>Gasto por Plataforma</h3><canvas id="chartSpend"></canvas></div>
      <div class="card"><h3>Performance Geral</h3><canvas id="chartPerformance"></canvas></div>
    </div>

    <div class="card">
      <h3>Plataformas Conectadas</h3>
      <div class="platform-list" id="platformList"></div>
    </div>
  </div>

  <div class="footer">ReportACT — Dashboard em tempo real</div>
</div>

<script>
const pathParts = window.location.pathname.split('/d/')
const slug = pathParts[1] || pathParts[0].split('/dashact/d/')[1]
const BASE = window.location.pathname.startsWith('/reportact') ? '/reportact' : window.location.pathname.startsWith('/dashact') ? '/dashact' : ''
let charts = {}

async function load() {
  try {
    const res = await fetch(window.location.origin + BASE + '/api/dashboards/client/' + slug)
    if (!res.ok) throw new Error('Dashboard não encontrado')
    const data = await res.json()
    if (!data.dashboard) throw new Error('Sem dados')
    render(data.dashboard)
  } catch (e) {
    document.getElementById('loading').innerHTML = `
      <p style="font-size:18px;font-weight:700;color:#EF4444">Dashboard não encontrado</p>
      <p style="color:rgba(255,255,255,0.55);margin-top:8px;font-size:14px">Verifique o link ou solicite um novo ao seu consultor.</p>`
  }
}

function render(dashboard) {
  document.getElementById('loading').style.display = 'none'
  document.getElementById('content').style.display = 'block'

  document.getElementById('dashTitle').textContent = dashboard.title || 'Dashboard'
  document.getElementById('dashClient').textContent = dashboard.client?.name || 'Cliente'
  document.getElementById('dashTime').textContent = new Date(dashboard.updated_at || Date.now()).toLocaleString('pt-BR')

  const metrics = dashboard.metrics?.overview
  if (metrics) {
    document.getElementById('kpiSpend').textContent = 'R$ ' + (metrics.total_spend || 0).toLocaleString('pt-BR', {minimumFractionDigits: 2})
    document.getElementById('kpiImpressions').textContent = (metrics.total_impressions || 0).toLocaleString('pt-BR')
    document.getElementById('kpiClicks').textContent = (metrics.total_clicks || 0).toLocaleString('pt-BR')
    document.getElementById('kpiConversions').textContent = (metrics.total_conversions || 0).toLocaleString('pt-BR')
  }

  const accounts = dashboard.metrics?.accounts || []
  document.getElementById('platformList').innerHTML = accounts.length === 0
    ? '<p style="color:rgba(255,255,255,0.55);font-size:13px">Nenhuma plataforma conectada ainda.</p>'
    : accounts.map(a => '<div class="platform-item"><span class="name">'+(a.account_name||a.platform)+'</span><span class="status '+(a.metrics?.fetched_at?'status-online':'status-offline')+'">'+(a.metrics?.fetched_at?'Dados atualizados':'Aguardando dados')+'</span></div>').join('')

  renderCharts(metrics)
}

function renderCharts(metrics) {
  Object.values(charts).forEach(c => c?.destroy())
  charts = {}
  if (!metrics) return

  const ctx1 = document.getElementById('chartSpend')?.getContext('2d')
  if (ctx1) {
    charts.spend = new Chart(ctx1, {
      type: 'doughnut',
      data: {
        labels: ['Meta Ads', 'Google Ads'],
        datasets: [{ data: [metrics.total_spend || 0, metrics.total_spend || 0], backgroundColor: ['#F5B113', '#222'], borderWidth: 0 }]
      },
      options: { responsive: true, maintainAspectRatio: true, cutout: '65%',
        plugins: { legend: { position: 'bottom', labels: { color: 'rgba(255,255,255,0.55)', font: { family: 'Inter' } } } } }
    })
  }

  const ctx2 = document.getElementById('chartPerformance')?.getContext('2d')
  if (ctx2) {
    charts.perf = new Chart(ctx2, {
      type: 'bar',
      data: {
        labels: ['Impressões', 'Cliques', 'Conversões'],
        datasets: [{ data: [metrics.total_impressions || 0, metrics.total_clicks || 0, metrics.total_conversions || 0],
          backgroundColor: ['rgba(245,177,19,0.3)', '#F5B113', '#C48D0E'], borderRadius: 6 }]
      },
      options: { responsive: true, maintainAspectRatio: true,
        scales: { y: { beginAtZero: true, ticks: { color: 'rgba(255,255,255,0.35)' } }, x: { ticks: { color: 'rgba(255,255,255,0.55)' } } },
        plugins: { legend: { display: false } } }
    })
  }
}

setInterval(load, 60000)
load()
</script>
</body>
</html>
