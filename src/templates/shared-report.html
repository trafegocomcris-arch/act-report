<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Relatório Compartilhado</title>
<link rel="icon" type="image/png" href="https://actcontrol.com.br/brand/favicon.png">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; background: #f0f2f5; }
.loading { text-align: center; padding: 80px 20px; color: #888; }
.loading .spinner { width: 40px; height: 40px; border: 3px solid #e5e7eb; border-top-color: #0d9488; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 16px; }
@keyframes spin { to { transform: rotate(360deg); } }
.error { text-align: center; padding: 80px 20px; }
.error h1 { font-size: 24px; color: #dc2626; }
.error p { color: #888; margin-top: 8px; }
</style>
</head>
<body>
<div id="root">
  <div class="loading">
    <div class="spinner"></div>
    <p>Carregando relatório...</p>
  </div>
</div>
<script>
const pathParts = window.location.pathname.split('/r/')
const token = pathParts[1] || pathParts[0].split('/dashact/r/')[1]
const BASE = window.location.pathname.startsWith('/dashact') ? '/dashact' : ''
fetch(window.location.origin + BASE + '/api/reports/shared/' + token)
  .then(r => {
    if (!r.ok) throw new Error('Relatório não encontrado')
    return r.text()
  })
  .then(html => {
    document.getElementById('root').innerHTML = html
  })
  .catch(e => {
    document.getElementById('root').innerHTML = `
      <div class="error">
        <h1>Relatório não encontrado</h1>
        <p>O link que você acessou é inválido ou expirou.</p>
      </div>`
  })
</script>
</body>
</html>
